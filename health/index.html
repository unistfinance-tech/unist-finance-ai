<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>지역 병원·약국 정보</title>
  <style>
    :root {
      --bg: #F3F6FA;
      --panel: #FFFFFF;
      --ink: #111827;
      --muted: #64748B;
      --line: #D9E1EA;
      --blue: #1261A6;
      --green: #15803D;
      --red: #B42318;
      --amber: #B45309;
      --soft-blue: #E8F2FE;
      --soft-green: #EAF7EF;
      --shadow: 0 10px 24px rgba(15, 23, 42, .10);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
    }
    button, input, select { font: inherit; }
    .app { min-height: 100vh; display: flex; flex-direction: column; }
    .top {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #0E1726;
      color: #fff;
      padding: 16px 16px 12px;
      box-shadow: var(--shadow);
    }
    .top h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
      font-weight: 800;
    }
    .meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      color: #E5EDF7;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .search {
      width: 100%;
      height: 42px;
      border: 1px solid rgba(255,255,255,.20);
      border-radius: 8px;
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }
    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .select {
      height: 40px;
      border: 1px solid rgba(255,255,255,.20);
      border-radius: 8px;
      padding: 0 10px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }
    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .tab {
      min-height: 38px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 8px;
      background: rgba(255,255,255,.08);
      color: #E5EDF7;
      font-weight: 800;
    }
    .tab.active {
      background: #fff;
      color: #0E1726;
    }
    main {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      padding: 12px 12px 88px;
    }
    .notice {
      border: 1px solid #F2D6A2;
      background: #FFF8E8;
      color: #6B3E02;
      padding: 11px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.45;
      margin-bottom: 10px;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-height: 72px;
    }
    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1.1;
      margin-bottom: 5px;
    }
    .stat span { color: var(--muted); font-size: 12px; font-weight: 700; }
    .result-bar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin: 12px 2px 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    .list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      box-shadow: 0 3px 10px rgba(15, 23, 42, .04);
    }
    .card-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
    }
    .name {
      margin: 0;
      font-size: 16px;
      line-height: 1.35;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    .badge {
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .badge.hospital { background: var(--soft-blue); color: var(--blue); }
    .badge.pharmacy { background: var(--soft-green); color: var(--green); }
    .fields {
      display: grid;
      gap: 7px;
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.45;
    }
    .field {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 8px;
    }
    .field b { color: #334155; }
    .field span { color: #1F2937; overflow-wrap: anywhere; }
    .unknown { color: var(--red); font-weight: 800; }
    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    .action {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 8px;
      border: 1px solid var(--line);
      color: #0F172A;
      background: #F8FAFC;
      font-weight: 800;
      font-size: 13px;
    }
    .action.primary {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }
    .empty {
      padding: 28px 12px;
      text-align: center;
      color: var(--muted);
      background: #fff;
      border: 1px dashed var(--line);
      border-radius: 8px;
      font-weight: 700;
    }
    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--line);
      border-top: 1px solid var(--line);
    }
    .bottom-nav button {
      min-height: 54px;
      border: 0;
      background: #fff;
      color: #334155;
      font-size: 12px;
      font-weight: 800;
    }
    .bottom-nav button.active { color: var(--blue); background: #EFF6FF; }
    @media (min-width: 720px) {
      .top { padding: 18px 24px 14px; }
      .controls { grid-template-columns: 1.4fr 1fr 1fr; align-items: center; }
      .summary { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .bottom-nav { display: none; }
      main { padding-bottom: 32px; }
    }
  </style>
</head>

uot;:&quot;hospital&quot;,&quot;areaKey&quot;:&quot;cheonsang&quot;,&quot;areaLabel&quot;:&quot;천상리&quot;,&quot;subtype&quot;:&quot;병원/의원&quot;,&quot;address&quot;:&quot;울산 울주군 범서읍 장검1길 63&quot;,&quot;phone&quot;:&quot;052-233-1900&quot;,&quot;hours&quot;:&quot;확인 필요&quot;,&quot;knownHours&quot;:false,&quot;lat&quot;:35.5508667007074,&quot;lng&quot;:129.252753376641,&quot;sourceUrl&quot;:&quot;http://place.map.kakao.com/10841423&quot;,&quot;priority&quot;:0,&quot;updatedAt&quot;:&quot;2026-06-29&quot;}]}</script>
  <script>
    const state = { kind: "all", area: "all", hours: "all", query: "" };
    const payload = JSON.parse(document.getElementById("payload").textContent);
    const list = document.getElementById("list");
    const search = document.getElementById("search");
    const area = document.getElementById("area");
    const hours = document.getElementById("hours");
    const resultText = document.getElementById("resultText");
    const visibleTotal = document.getElementById("visibleTotal");
    const tabs = [...document.querySelectorAll(".tab, .bottom-nav button")];

    function normalize(value) {
      return String(value || "").toLowerCase().replace(/\s+/g, "");
    }

    function mapUrl(place) {
      if (place.sourceUrl) return place.sourceUrl;
      if (place.lat && place.lng) return "https://map.kakao.com/link/map/" + encodeURIComponent(place.name) + "," + place.lat + "," + place.lng;
      return "https://map.kakao.com/?q=" + encodeURIComponent(place.name + " " + place.address);
    }

    function renderCard(place) {
      const phoneLink = place.phone ? '<a class="action primary" href="tel:' + place.phone.replace(/[^0-9+]/g, "") + '">전화하기</a>' : '<span class="action">전화 없음</span>';
      const hoursText = place.knownHours ? place.hours : '<span class="unknown">' + place.hours + '</span>';
      return '<article class="card">'
        + '<div class="card-head">'
        + '<h2 class="name">' + escapeHtml(place.name) + '</h2>'
        + '<span class="badge ' + place.category + '">' + place.kind + '</span>'
        + '</div>'
        + '<div class="fields">'
        + '<div class="field"><b>지역</b><span>' + escapeHtml(place.areaLabel) + '</span></div>'
        + '<div class="field"><b>시간</b><span>' + hoursText + '</span></div>'
        + '<div class="field"><b>전화</b><span>' + escapeHtml(place.phone || "확인 필요") + '</span></div>'
        + '<div class="field"><b>주소</b><span>' + escapeHtml(place.address || "확인 필요") + '</span></div>'
        + '</div>'
        + '<div class="actions">'
        + phoneLink
        + '<a class="action" target="_blank" rel="noopener" href="' + mapUrl(place) + '">지도 보기</a>'
        + '</div>'
        + '</article>';
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    }

    function filteredPlaces() {
      const query = normalize(state.query);
      return payload.places.filter((place) => {
        if (state.kind !== "all" && place.category !== state.kind) return false;
        if (state.area !== "all" && place.areaKey !== state.area) return false;
        if (state.hours === "known" && !place.knownHours) return false;
        if (state.hours === "unknown" && place.knownHours) return false;
        if (!query) return true;
        return normalize([place.name, place.address, place.phone, place.areaLabel, place.subtype].join(" ")).includes(query);
      });
    }

    function render() {
      const rows = filteredPlaces();
      visibleTotal.textContent = rows.length;
      resultText.textContent = rows.length ? rows.length + "곳 표시" : "검색 결과 없음";
      list.innerHTML = rows.length ? rows.map(renderCard).join("") : '<div class="empty">조건에 맞는 병원·약국이 없습니다.</div>';
      tabs.forEach((button) => button.classList.toggle("active", button.dataset.kind === state.kind));
    }

    search.addEventListener("input", () => { state.query = search.value; render(); });
    area.addEventListener("change", () => { state.area = area.value; render(); });
    hours.addEventListener("change", () => { state.hours = hours.value; render(); });
    tabs.forEach((button) => button.addEventListener("click", () => { state.kind = button.dataset.kind; render(); }));
    render();
  </script>
