<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>병원·약국 정보</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #F3F6FA;
      --panel: #FFFFFF;
      --ink: #111827;
      --muted: #64748B;
      --line: #D9E1EA;
      --blue: #1261A6;
      --green: #15803D;
      --red: #B42318;
      --navy: #0E1726;
      --soft-blue: #E8F2FE;
      --soft-green: #EAF7EF;
      --soft-gray: #F8FAFC;
      --shadow: 0 8px 20px rgba(15, 23, 42, .12);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; min-height: 100%; overflow: hidden; }
    body {
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
    }
    button, input, select { font: inherit; }
    .app { height: 100dvh; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
    .top {
      position: relative;
      top: 0;
      z-index: 20;
      flex: 0 0 auto;
      background: var(--navy);
      color: #fff;
      padding: 13px 12px 11px;
      box-shadow: var(--shadow);
    }
    .top h1 { margin: 0; font-size: 20px; line-height: 1.25; font-weight: 900; }
    .meta { display: none; }
    .pill {
      display: inline-flex; align-items: center; min-height: 28px; padding: 5px 9px;
      border-radius: 999px; background: rgba(255,255,255,.10); color: #E5EDF7;
      font-size: 12px; font-weight: 800; white-space: nowrap;
    }
    .area-tabs {
      display: grid; grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 4px; margin-top: 10px;
    }
    .area-tab, .tab {
      min-height: 27px; border: 1px solid rgba(255,255,255,.22); border-radius: 8px;
      background: rgba(255,255,255,.08); color: #E5EDF7; font-size: 11px; font-weight: 900;
    }
    .area-tab.active, .tab.active { background: #fff; color: var(--navy); }
    .controls { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 7px; margin-top: 9px; }
    .search, .select {
      width: 100%; height: 32px; border: 1px solid rgba(255,255,255,.20); border-radius: 8px;
      padding: 0 12px; background: #fff; color: var(--ink); outline: none;
    }
    .filter-row { display: grid; grid-template-columns: 1fr; gap: 0; }
    .area-select-wrap { display: none; }
    .tabs { display: none; }
    main { width: 100%; max-width: 980px; margin: 0 auto; padding: 0 12px 0; flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
    .notice {
      border: 1px solid #D5E3F4; background: #F8FBFF; color: #24415F;
      padding: 10px 12px; border-radius: 10px; font-size: 13px; line-height: 1.45; margin-bottom: 10px;
    }
    .summary { display: none; }
    .result-bar { display: flex; justify-content: space-between; gap: 10px; align-items: center; margin: 8px 2px 7px; color: var(--muted); font-size: 13px; font-weight: 800; flex: 0 0 auto; }
    .notice-btn {
      min-height: 30px;
      border: 1px solid #BFD1E5;
      border-radius: 999px;
      background: #FFFFFF;
      color: #174E89;
      padding: 0 11px;
      font-size: 12px;
      font-weight: 900;
    }
    .list { display: grid; grid-template-columns: 1fr; gap: 6px; min-height: 0; overflow-y: auto; padding-bottom: 40px; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }
    .card {
      background: var(--panel); border: 1px solid var(--line); border-radius: 9px;
      padding: 8px 9px; box-shadow: 0 2px 8px rgba(15, 23, 42, .04); cursor: pointer;
    }
    .card.selected {
      background: #EEF6FF;
      border-color: #1261A6;
      box-shadow: 0 0 0 2px rgba(18, 97, 166, .18), 0 4px 12px rgba(15, 23, 42, .08);
    }
    .card.selected .name { color: #0B5CAD; }
    .card:active { transform: translateY(1px); }
    .card-head { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 7px; align-items: start; }
    .name { margin: 0; font-size: 14px; line-height: 1.18; word-break: keep-all; overflow-wrap: anywhere; }
    .badge { display: inline-flex; min-height: 21px; align-items: center; padding: 2px 6px; border-radius: 999px; font-size: 11px; font-weight: 900; white-space: nowrap; }
    .badge.hospital { background: #FEE2E2; color: #B42318; }
    .badge.pharmacy { background: var(--soft-blue); color: var(--blue); }
    .fields { display: grid; gap: 3px; margin-top: 5px; font-size: 11.5px; line-height: 1.22; }
    .field { display: grid; grid-template-columns: 64px minmax(0, 1fr); gap: 5px; }
    .field b { color: #334155; }
    .field span { color: #1F2937; overflow-wrap: anywhere; }
    .contact-line {
      margin-top: 4px;
      color: #334155;
      font-size: 11.5px;
      font-weight: 800;
      line-height: 1.22;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .unknown { color: var(--red); font-weight: 900; }
    .empty { padding: 28px 12px; text-align: center; color: var(--muted); background: #fff; border: 1px dashed var(--line); border-radius: 10px; font-weight: 800; }
    .bottom-nav {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--line); border-top: 1px solid var(--line);
    }
    .bottom-nav button, .bottom-nav a {
      min-height: 30px; border: 0; background: #fff; color: #334155; font-size: 11px; font-weight: 900;
      text-decoration: none; display: inline-flex; align-items: center; justify-content: center;
    }
    .bottom-nav a.main-link { background: var(--navy); color: #fff; }
    .bottom-nav button.active { color: var(--blue); background: #EFF6FF; }
    .mobile-map-dock {
      position: relative;
      z-index: 1;
      flex: 0 0 auto;
      width: calc(100% + 24px);
      height: 45vw;
      max-height: 180px;
      min-height: 160px;
      aspect-ratio: auto;
      margin: 0 -12px 8px;
      background: #FFFFFF;
      border: 0;
      border-radius: 0;
      overflow: hidden;
      box-shadow: 0 5px 14px rgba(15,23,42,.10);
    }
    .mobile-map-title {
      position: absolute;
      top: 6px;
      left: 8px;
      z-index: 500;
      min-height: 24px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 3px 9px;
      color: #0F172A;
      font-size: 12px;
      font-weight: 950;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(15,23,42,.14);
      border-radius: 999px;
      box-shadow: 0 4px 12px rgba(15,23,42,.14);
    }
    #mapDockCount { color: #1261A6; font-weight: 950; }
    .area-map {
      width: 100%;
      height: 100%;
      background: #EEF3F8;
    }
    .area-map .leaflet-tile,
    .detail-map .leaflet-tile {
      filter: grayscale(1) contrast(.92) brightness(1.04);
    }
    .detail-backdrop { position: fixed; inset: 0; z-index: 40; background: rgba(15,23,42,.34); display: none; align-items: flex-end; }
    .detail-backdrop.open { display: flex; }
    .detail-panel {
      width: 100%; max-height: 86dvh; overflow: auto; background: #fff; border-radius: 18px 18px 0 0;
      box-shadow: 0 -16px 34px rgba(15,23,42,.20); padding: 12px 14px calc(20px + env(safe-area-inset-bottom));
    }
    .detail-grip {
      width: 58px;
      height: 7px;
      border-radius: 999px;
      background: #0F172A;
      margin: 0 auto 10px;
      cursor: grab;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    .detail-head { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; align-items: start; }
    .detail-title { margin: 0; font-size: 19px; line-height: 1.35; font-weight: 900; color: #0F172A; }
    .close-btn { width: 34px; height: 34px; border: 1px solid var(--line); border-radius: 9px; background: #fff; color: #0F172A; font-size: 20px; font-weight: 900; }
    .detail-sub { margin-top: 3px; color: var(--muted); font-size: 13px; font-weight: 800; }
    .detail-map-wrap { position: relative; margin: 8px 0 0; }
    .detail-map { height: 158px; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; background: #EEF3F8; }
    .detail-map-close {
      position: absolute;
      right: 10px;
      bottom: 10px;
      z-index: 700;
      width: 34px;
      height: 34px;
      border: 1px solid #0F172A;
      border-radius: 9px;
      background: #FFFFFF;
      color: #0F172A;
      font-size: 20px;
      font-weight: 950;
      line-height: 1;
      box-shadow: 0 6px 16px rgba(15,23,42,.22);
    }
    .detail-grid { display: grid; gap: 10px; }
    .info-box { border: 1px solid var(--line); border-radius: 12px; overflow: hidden; background: #fff; }
    .info-row { display: grid; grid-template-columns: 82px minmax(0, 1fr); border-top: 1px solid var(--line); }
    .info-row:first-child { border-top: 0; }
    .info-row b { background: #F3F6FA; color: #516174; padding: 6px 8px; font-size: 12px; }
    .info-row span { padding: 6px 8px; font-size: 12px; line-height: 1.35; overflow-wrap: anywhere; }
    .section-title { margin: 10px 0 5px; font-size: 13px; font-weight: 900; color: #0F172A; }
    .source-chip { display: inline-flex; min-height: 24px; align-items: center; padding: 4px 8px; border-radius: 999px; background: #EEF4FF; color: #174E89; font-size: 12px; font-weight: 900; }
    .source-chip.warn { background: #FFF7ED; color: #9A3412; }
    .source-chip.muted { background: #F1F5F9; color: #475569; }
    .leaflet-control-attribution { font-size: 9px; }
    @media (min-width: 720px) {
      html, body { height: auto; min-height: 100%; overflow: auto; }
      .app { min-height: 100vh; height: auto; overflow: visible; }
      .top { position: sticky; }
      .top { padding: 18px 24px 14px; }
      .area-tabs { grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 6px; }
      .controls { grid-template-columns: repeat(2, minmax(0, 1fr)); align-items: center; }
      .list { grid-template-columns: repeat(2, minmax(0, 1fr)); overflow: visible; padding-bottom: 0; }
      .bottom-nav { display: none; }
      .mobile-map-dock { display: none; }
      main { display: block; overflow: visible; padding-bottom: 32px; }
      .detail-backdrop { align-items: center; justify-content: center; }
      .detail-panel { max-width: 760px; border-radius: 18px; max-height: 88vh; padding-bottom: 18px; }
      .detail-map { height: 195px; }
    }
  </style>
</head>

  <script>
    const state = { kind: "all", area: "all", hours: "openNow", query: "" };
    const payload = JSON.parse(document.getElementById("payload").textContent);
    const placeMap = new Map(payload.places.map((place) => [place.id, place]));
    const list = document.getElementById("list");
    const search = document.getElementById("search");
    const area = document.getElementById("area");
    const hours = document.getElementById("hours");
    const resultText = document.getElementById("resultText");
    const noticeButton = document.getElementById("noticeButton");
    const visibleTotal = document.getElementById("visibleTotal");
    const tabs = [...document.querySelectorAll(".tab, .bottom-nav button")];
    const areaTabs = [...document.querySelectorAll(".area-tab")];
    const backdrop = document.getElementById("detailBackdrop");
    const detailContent = document.getElementById("detailContent");
    const areaMapEl = document.getElementById("areaMap");
    const mapDockTitle = document.getElementById("mapDockTitle");
    const mapDockCount = document.getElementById("mapDockCount");
    let detailMap = null;
    let areaMap = null;
    let areaLayer = null;
    let detailDragStartY = null;
    let detailDragActive = false;
    let activeDetailPlaceId = null;

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    }
    function normalize(value) { return String(value || "").toLowerCase().replace(/\s+/g, ""); }
    function mapUrl(place) { return place.sourceUrl || "https://map.kakao.com/?q=" + encodeURIComponent(place.name + " " + place.areaLabel); }
    function telHref(phone) { return "tel:" + String(phone || "").replace(/[^0-9+]/g, ""); }
    function parseRange(value) {
      const match = String(value || "").replace(/\s+/g, "").match(/(\d{1,2}):(\d{2})~(\d{1,2}):(\d{2})/);
      if (!match) return null;
      const start = Number(match[1]) * 60 + Number(match[2]);
      let end = Number(match[3]) * 60 + Number(match[4]);
      if (end < start) end += 1440;
      return { start, end };
    }
    function scheduleValue(place, label) {
      return place.schedule?.rows?.find((row) => row.label === label)?.value || "";
    }
    function inRange(rangeText, minute) {
      const range = parseRange(rangeText);
      return Boolean(range && minute >= range.start && minute < range.end);
    }
    function seoulClock(now = new Date()) {
      return { today: now.getDay(), minute: now.getHours() * 60 + now.getMinutes() };
    }
    function isOpenNow(place, now = new Date()) {
      if (!place.schedule) return false;
      const labels = ["일", "월", "화", "수", "목", "금", "토"];
      const { today, minute } = seoulClock(now);
      if (inRange(scheduleValue(place, labels[today]), minute)) return true;
      const prevRange = parseRange(scheduleValue(place, labels[(today + 6) % 7]));
      return Boolean(prevRange && prevRange.end > 1440 && minute + 1440 >= prevRange.start && minute + 1440 < prevRange.end);
    }
    function hoursBadge(place) {
      if (isOpenNow(place)) return '<span style="color:#15803D;font-weight:900">현재 운영중</span>';
      if (place.knownHours) return '<span>운영시간 확인</span>';
      return '<span class="unknown">확인 필요</span>';
    }
    function statusLabel(status) {
      if (status === "strong") return '<span class="source-chip">매칭</span>';
      if (status === "candidate") return '<span class="source-chip warn">후보·확인필요</span>';
      return '<span class="source-chip muted">자료없음</span>';
    }
    function scheduleRows(schedule) {
      if (!schedule) return '<div class="info-row"><b>운영시간</b><span class="unknown">확인 필요</span></div>';
      return schedule.rows.map((row) => '<div class="info-row"><b>' + row.label + '</b><span>' + escapeHtml(row.value || "확인 필요") + '</span></div>').join("");
    }
    function renderCard(place) {
      const hoursText = hoursBadge(place);
      return '<article class="card' + (place.id === state.focusedId ? ' selected' : '') + '" data-id="' + escapeHtml(place.id) + '" tabindex="0">'
        + '<div class="card-head"><h2 class="name">' + escapeHtml(place.name) + '</h2><span class="badge ' + place.category + '">' + place.kind + '</span></div>'
        + '<div class="fields">'
        + '<div class="field"><b>운영시간</b>' + hoursText + '</div>'
        + '</div>'
        + '<div class="contact-line">전화 ' + escapeHtml(place.phone || "확인필요") + '  ㅣ  주소 ' + escapeHtml(place.shortAddress || place.address || "확인필요") + '</div>'
        + '</article>';
    }
    function filteredPlaces() {
      const query = normalize(state.query);
      return payload.places.filter((place) => {
        if (state.kind !== "all" && place.category !== state.kind) return false;
        if (state.area !== "all" && place.areaKey !== state.area) return false;
        if (state.hours === "openNow" && !isOpenNow(place)) return false;
        if (state.hours === "known" && !place.knownHours) return false;
        if (state.hours === "unknown" && place.knownHours) return false;
        if (!query) return true;
        return normalize([place.name, place.address, place.phone, place.areaLabel, place.subtype].join(" ")).includes(query);
      });
    }
    function prioritizeFocusedPlace(rows) {
      if (!state.focusedId) return rows;
      const index = rows.findIndex((row) => row.id === state.focusedId);
      if (index <= 0) return rows;
      return [rows[index], ...rows.slice(0, index), ...rows.slice(index + 1)];
    }
    function render() {
      const rows = prioritizeFocusedPlace(filteredPlaces());
      if (visibleTotal) visibleTotal.textContent = rows.length;
      resultText.textContent = rows.length ? rows.length + "곳 표시" : "검색 결과 없음";
      list.innerHTML = rows.length ? rows.map(renderCard).join("") : '<div class="empty">조건에 맞는 병원·약국이 없습니다.</div>';
      tabs.forEach((button) => button.classList.toggle("active", button.dataset.kind === state.kind));
      areaTabs.forEach((button) => button.classList.toggle("active", button.dataset.area === state.area));
      updateAreaMap(rows);
    }
    function openDetail(place) {
      activeDetailPlaceId = place.id;
      const pd = place.publicData;
      const scheduleSource = place.schedule?.source || "확인 필요";
      detailContent.innerHTML = '<div class="detail-head">'
        + '<div><h2 class="detail-title">' + escapeHtml(place.name) + '</h2><div class="detail-sub">' + escapeHtml(place.areaLabel + " · " + place.kind + (place.subtype ? " · " + place.subtype : "")) + '</div></div>'
        + '<button class="close-btn" type="button" id="closeDetail">×</button>'
        + '</div>'
        + (place.category === "hospital" ? '<h3 class="section-title">진료과목</h3><div class="info-box"><div class="info-row"><b>과목</b><span>' + escapeHtml(place.specialty || "확인 필요") + '</span></div></div>' : '')
        + '<h3 class="section-title">운영시간</h3>'
        + '<div class="info-box">' + scheduleRows(place.schedule) + '<div class="info-row"><b>시간출처</b><span>' + escapeHtml(scheduleSource) + '</span></div></div>'
        + '<h3 class="section-title">기본정보</h3>'
        + '<div class="info-box">'
        + '<div class="info-row"><b>전화번호</b><span>' + escapeHtml(place.phone || "확인 필요") + '</span></div>'
        + '<div class="info-row"><b>분류</b><span>' + escapeHtml(place.kind + (place.subtype ? " / " + place.subtype : "")) + '</span></div>'
        + '<div class="info-row"><b>출처</b><span>카카오 로컬 기준 · 공공 API 보강</span></div>'
        + '</div>'
        + '<h3 class="section-title">공공데이터 매칭</h3>'
        + '<div class="info-box">'
        + '<div class="info-row"><b>심평원</b><span>' + statusLabel(pd.hira.status) + ' ' + escapeHtml(pd.hira.status === "none" ? "매칭자료 없음" : (pd.hira.name + " / " + (pd.hira.phone || "전화없음"))) + '</span></div>'
        + '<div class="info-row"><b>심평원 주소</b><span>' + escapeHtml(pd.hira.address || "확인 필요") + '</span></div>'
        + '<div class="info-row"><b>E-GEN</b><span>' + statusLabel(pd.egen.status) + ' ' + escapeHtml(pd.egen.status === "none" ? "약국 운영시간 자료 없음" : (pd.egen.name + " / " + (pd.egen.phone || "전화없음"))) + '</span></div>'
        + '<div class="info-row"><b>파일자료</b><span>' + statusLabel(pd.fileHours.status) + ' ' + escapeHtml(pd.fileHours.source || "야간·휴일 운영시간 매칭자료 없음") + '</span></div>'
        + '</div>'
        + '<h3 class="section-title">메모</h3>'
        + '<div class="info-box"><div class="info-row"><b>확인</b><span>병원 진료시간·휴게시간은 공공 API에 누락될 수 있어 방문 전 전화 확인을 권장합니다.</span></div></div>'
        + '<h3 class="section-title">위치</h3>'
        + '<div class="info-box">'
        + '<div class="info-row"><b>주소</b><span>' + escapeHtml(place.address || "확인 필요") + '</span></div>'
        + '</div>'
        + '<div class="detail-map-wrap"><div class="detail-map" id="detailMap"></div><button class="detail-map-close" type="button" id="closeDetailBottom" aria-label="닫기">×</button></div>';
      backdrop.classList.add("open");
      backdrop.setAttribute("aria-hidden", "false");
      document.getElementById("closeDetail").addEventListener("click", closeDetail);
      document.getElementById("closeDetailBottom").addEventListener("click", closeDetail);
      bindDetailGrip();
      setTimeout(() => drawDetailMap(place), 80);
    }
    function closeDetail() {
      backdrop.classList.remove("open");
      backdrop.setAttribute("aria-hidden", "true");
      if (activeDetailPlaceId) {
        state.focusedId = activeDetailPlaceId;
        activeDetailPlaceId = null;
        render();
        requestAnimationFrame(() => { list.scrollTop = 0; });
      }
      detailDragStartY = null;
      detailDragActive = false;
      if (detailMap) {
        detailMap.remove();
        detailMap = null;
      }
    }
    function isDetailTopDragTarget(target, clientY) {
      if (!backdrop.classList.contains("open")) return false;
      if (target?.closest?.(".detail-grip")) return true;
      const panel = document.querySelector(".detail-panel");
      if (!panel) return false;
      const rect = panel.getBoundingClientRect();
      return clientY >= rect.top && clientY <= rect.top + 54;
    }
    function startDetailDrag(target, clientY) {
      if (!isDetailTopDragTarget(target, clientY)) return;
      detailDragStartY = clientY;
      detailDragActive = true;
    }
    function moveDetailDrag(clientY) {
      if (detailDragActive && detailDragStartY !== null && clientY - detailDragStartY > 38) closeDetail();
    }
    function endDetailDrag(clientY) {
      if (detailDragActive && detailDragStartY !== null && clientY - detailDragStartY > 38) closeDetail();
      detailDragStartY = null;
      detailDragActive = false;
    }
    function bindDetailGrip() {
      const grip = document.querySelector(".detail-grip");
      const panel = document.querySelector(".detail-panel");
      if (!grip) return;
      if (panel && !panel.dataset.dragBound) {
        panel.dataset.dragBound = "1";
        panel.addEventListener("pointerdown", (event) => startDetailDrag(event.target, event.clientY));
        panel.addEventListener("pointermove", (event) => moveDetailDrag(event.clientY));
        panel.addEventListener("pointerup", (event) => endDetailDrag(event.clientY));
        panel.addEventListener("mousedown", (event) => startDetailDrag(event.target, event.clientY));
        panel.addEventListener("mousemove", (event) => moveDetailDrag(event.clientY));
        panel.addEventListener("mouseup", (event) => endDetailDrag(event.clientY));
        panel.addEventListener("touchstart", (event) => startDetailDrag(event.target, event.touches?.[0]?.clientY ?? 0), { passive: true });
        panel.addEventListener("touchmove", (event) => moveDetailDrag(event.touches?.[0]?.clientY ?? 0), { passive: true });
        panel.addEventListener("touchend", (event) => endDetailDrag(event.changedTouches?.[0]?.clientY ?? detailDragStartY), { passive: true });
      }
      if (grip.dataset.dragBound) return;
      grip.dataset.dragBound = "1";
      grip.addEventListener("pointerdown", (event) => {
        startDetailDrag(event.target, event.clientY);
        event.preventDefault?.();
        grip.setPointerCapture?.(event.pointerId);
      });
      grip.addEventListener("pointerup", (event) => {
        endDetailDrag(event.clientY);
      });
      grip.addEventListener("pointermove", (event) => {
        moveDetailDrag(event.clientY);
      });
      grip.addEventListener("pointercancel", () => {
        detailDragStartY = null;
        detailDragActive = false;
      });
      grip.addEventListener("mousedown", (event) => {
        startDetailDrag(event.target, event.clientY);
        event.preventDefault?.();
      });
      grip.addEventListener("click", () => {
        closeDetail();
      });
      grip.addEventListener("mouseup", (event) => {
        endDetailDrag(event.clientY);
      });
      grip.addEventListener("mousemove", (event) => {
        moveDetailDrag(event.clientY);
      });
      grip.addEventListener("touchstart", (event) => {
        startDetailDrag(event.target, event.touches?.[0]?.clientY ?? 0);
      }, { passive: true });
      grip.addEventListener("touchend", (event) => {
        const endY = event.changedTouches?.[0]?.clientY ?? detailDragStartY;
        endDetailDrag(endY);
      }, { passive: true });
      grip.addEventListener("touchmove", (event) => {
        const y = event.touches?.[0]?.clientY ?? detailDragStartY;
        moveDetailDrag(y);
      }, { passive: true });
    }
    function ensureAreaMap() {
      if (!areaMapEl) return null;
      if (!window.L) {
        areaMapEl.innerHTML = '<div style="padding:16px;font-weight:900;color:#64748B">지도를 불러오는 중입니다.</div>';
        return null;
      }
      if (!areaMap) {
        areaMap = L.map(areaMapEl, { zoomControl: false, attributionControl: false, scrollWheelZoom: false }).setView([35.55, 129.25], 13);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19 }).addTo(areaMap);
        areaLayer = L.layerGroup().addTo(areaMap);
      }
      return areaMap;
    }
    function updateAreaMap(rows) {
      const title = state.area === "all" ? "전체 위치" : ((payload.areaLabels[state.area] || "동네") + " 위치");
      if (mapDockTitle) mapDockTitle.textContent = title;
      if (mapDockCount) mapDockCount.textContent = rows.length + "곳";
      const map = ensureAreaMap();
      if (!map || !areaLayer) return;
      areaLayer.clearLayers();
      const points = rows.filter((row) => row.lat && row.lng);
      points.forEach((row) => {
        const color = row.category === "pharmacy" ? "#2563EB" : "#DC2626";
        L.circleMarker([row.lat, row.lng], {
          radius: 5,
          color,
          weight: 2,
          fillColor: color,
          fillOpacity: 0.78,
        })
          .bindTooltip(row.name, { direction: "top", offset: [0, -6] })
          .on("click", () => openDetail(row))
          .addTo(areaLayer);
      });
      if (points.length) {
        if (points.length === 1) {
          map.setView([points[0].lat, points[0].lng], 16);
        } else if (state.area !== "all" && payload.areaCenters[state.area]) {
          map.setView(payload.areaCenters[state.area], state.area === "okdong" ? 16 : 15);
        } else {
          const bounds = L.latLngBounds(points.map((row) => [row.lat, row.lng]));
          map.fitBounds(bounds, { padding: [18, 18], maxZoom: 14 });
        }
      } else if (payload.areaCenters[state.area]) {
        map.setView(payload.areaCenters[state.area], state.area === "okdong" ? 16 : 15);
      }
      setTimeout(() => map.invalidateSize(), 80);
    }
    function drawDetailMap(place) {
      const el = document.getElementById("detailMap");
      if (!el || !window.L) {
        if (el) el.innerHTML = '<div style="padding:16px;font-weight:800;color:#64748B">지도를 불러오지 못했습니다.</div>';
        return;
      }
      if (detailMap) detailMap.remove();
      const center = place.lat && place.lng ? [place.lat, place.lng] : (payload.areaCenters[place.areaKey] || [35.55, 129.25]);
      detailMap = L.map(el, { zoomControl: false, attributionControl: true }).setView(center, 15);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19, attribution: "© OpenStreetMap" }).addTo(detailMap);
      const sameArea = payload.places.filter((row) => row.areaKey === place.areaKey && row.lat && row.lng);
      sameArea.forEach((row) => {
        const selected = row.id === place.id;
        const color = row.category === "pharmacy" ? "#2563EB" : "#DC2626";
        L.circleMarker([row.lat, row.lng], {
          radius: selected ? 8 : 4,
          color: selected ? "#0F172A" : color,
          weight: selected ? 3 : 1,
          fillColor: color,
          fillOpacity: selected ? 0.95 : 0.6,
        }).bindTooltip(row.name, { direction: "top", offset: [0, -6] }).addTo(detailMap);
      });
      if (place.lat && place.lng) detailMap.setView([place.lat, place.lng], 16);
      setTimeout(() => detailMap?.invalidateSize(), 120);
    }
    search.addEventListener("input", () => { state.query = search.value; render(); });
    area.addEventListener("change", () => { state.area = area.value; render(); });
    areaTabs.forEach((button) => button.addEventListener("click", () => { state.area = button.dataset.area; area.value = state.area; render(); }));
    hours.addEventListener("change", () => { state.hours = hours.value; render(); });
    tabs.forEach((button) => button.addEventListener("click", () => { state.kind = button.dataset.kind; render(); }));
    noticeButton.addEventListener("click", () => {
      alert("공공 API와 카카오 로컬 데이터를 함께 정리한 참고용 화면입니다. 병원 운영시간과 휴게시간은 공공자료에 누락될 수 있어 방문 전 전화 확인을 권장합니다.");
    });
    list.addEventListener("click", (event) => {
      if (event.target.closest("a")) return;
      const card = event.target.closest(".card");
      if (!card) return;
      const place = placeMap.get(card.dataset.id);
      if (place) openDetail(place);
    });
    list.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      const card = event.target.closest(".card");
      if (!card) return;
      const place = placeMap.get(card.dataset.id);
      if (place) openDetail(place);
    });
    document.querySelectorAll(".top, .mobile-map-dock, .result-bar").forEach((el) => {
      el.addEventListener("wheel", (event) => {
        if (!event.deltaY) return;
        list.scrollTop += event.deltaY;
        event.preventDefault();
      }, { passive: false });
    });
    backdrop.addEventListener("click", (event) => { if (event.target === backdrop) closeDetail(); });
    document.addEventListener("keydown", (event) => { if (event.key === "Escape" && backdrop.classList.contains("open")) closeDetail(); });
    hours.value = state.hours;
    render();
  </script>
</body>
</html>
