<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>유니스트 학원지도</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #101828;
      --line: #d7dfeb;
      --blue: #1769c2;
      --blue-dark: #0f3f76;
      --panel: rgba(255, 255, 255, .88);
      --shadow: 0 18px 54px rgba(15, 23, 42, .12);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", system-ui, sans-serif;
      color: var(--ink);
      background: linear-gradient(rgba(247, 250, 252, .84), rgba(237, 243, 248, .9));
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(145deg, rgba(255,255,255,.56), rgba(226,232,240,.76));
    }
    .map-bg {
      position: fixed;
      inset: 50%;
      z-index: -2;
      width: 768px;
      height: 768px;
      display: grid;
      grid-template-columns: repeat(3, 256px);
      grid-template-rows: repeat(3, 256px);
      transform: translate(-50%, -50%) scale(1.58);
      transform-origin: center;
      filter: grayscale(1) contrast(.94) brightness(1.06);
      opacity: .95;
      pointer-events: none;
    }
    .map-bg img {
      width: 256px;
      height: 256px;
      display: block;
    }
    .shell {
      min-height: 100vh;
      width: min(980px, 100%);
      margin: 0 auto;
      padding: clamp(54px, 10vw, 92px) 14px 18px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
    }
    header { text-align: center; }
    h1 {
      margin: 0;
      color: #111827;
      font-size: clamp(28px, 7vw, 52px);
      line-height: 1.05;
      letter-spacing: 0;
      font-weight: 950;
    }
    .center {
      display: grid;
      align-content: center;
      min-height: 66vh;
    }
    .panel {
      width: min(420px, 84vw);
      margin: 0 auto;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      padding: 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: 1fr;
      gap: 14px;
      width: 100%;
    }
    .region-card {
      aspect-ratio: 1 / 1;
      width: 100%;
      height: auto;
      min-width: 0;
      min-height: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #111827;
      border: 2px solid #111827;
      border-radius: 16px;
      background: transparent;
      transition: transform .16s ease, background .16s ease, box-shadow .16s ease;
      font-size: clamp(23px, 6vw, 32px);
      font-weight: 950;
      letter-spacing: 0;
    }
    .region-card:hover, .region-card:focus-visible {
      background: #fff;
      box-shadow: inset 0 0 0 2px rgba(23,105,194,.16);
      transform: translateY(-1px);
      outline: none;
    }
    footer {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      color: #667085;
      font-size: 11px;
      font-weight: 800;
      padding: 0 4px;
    }
    footer span:nth-child(1) { text-align: left; }
    footer span:nth-child(2) { text-align: center; }
    footer span:nth-child(3) { text-align: right; }
    @media (max-width: 520px) {
      .shell { padding: 60px 10px 14px; gap: 14px; }
      .center { min-height: 70vh; }
      .grid {
        width: 100%;
        margin: 0 auto;
        gap: 10px;
      }
      .region-card { border-radius: 14px; }
      footer { font-size: 10px; }
    }
  </style>
</head>
<body>
  <div class="map-bg" aria-hidden="true">
<img src="https://tile.openstreetmap.org/11/1758/806.png" alt="" loading="eager" /><img src="https://tile.openstreetmap.org/11/1759/806.png" alt="" loading="eager" /><img src="https://tile.openstreetmap.org/11/1760/806.png" alt="" loading="eager" /><img src="https://tile.openstreetmap.org/11/1758/807.png" alt="" loading="eager" /><img src="https://tile.openstreetmap.org/11/1759/807.png" alt="" loading="eager" /><img src="https://tile.openstreetmap.org/11/1760/807.png" alt="" loading="eager" /><img src="https://tile.openstreetmap.org/11/1758/808.png" alt="" loading="eager" /><img src="https://tile.openstreetmap.org/11/1759/808.png" alt="" loading="eager" /><img src="https://tile.openstreetmap.org/11/1760/808.png" alt="" loading="eager" />
  </div>
  <main class="shell">
    <header>
      <h1>유니스트 학원지도</h1>
    </header>
    <section class="center" aria-label="지역 선택">
      <div class="panel">
        <div class="grid">

        <a class="region-card okdong" href="okdong/okdong_academy_map.html">옥동</a>
        <a class="region-card mugeo" href="mugeo/mugeo_academy_map.html">무거동</a>
        <a class="region-card cheonsang" href="cheonsang/cheonsang_academy_map.html">천상리</a>
        <a class="region-card guyeong" href="guyeong/guyeong_academy_map.html">구영리</a>
        </div>
      </div>
    </section>
    <footer>
      <span>제작일:26.06.28</span>
      <span>업데이트:26.06.28</span>
      <span>v1.0</span>
    </footer>
  </main>
</body>
</html>
